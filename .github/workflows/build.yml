name: Build Windows Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'  # Triggers release when a tag like v1.0.0 is pushed
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # Crucial for the release upload permission
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 yt-dlp

      - name: Create fallback JSON files
        # Prevents PyInstaller from failing if git ignored these local development files
        run: |
          if (!(Test-Path -Path settings.json)) { Set-Content -Path settings.json -Value "{}" }
          if (!(Test-Path -Path history.json)) { Set-Content -Path history.json -Value "[]" }

      - name: Build Application with PyInstaller
        # We use ';' to separate paths on Windows for --add-data
        run: >
          pyinstaller --noconfirm --windowed --onefile 
          --name "UltimateMediaDownloader" 
          --hidden-import "yt_dlp" 
          --hidden-import "PyQt5" 
          --add-data "me.jpg;." 
          --add-data "settings.json;." 
          --add-data "history.json;." 
          main.py

      - name: Upload Windows executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltimateMediaDownloader-Windows
          path: dist/UltimateMediaDownloader.exe

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/UltimateMediaDownloader.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
