name: Build Cross-Platform Releases

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Allows manual triggering of the build from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller and Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 yt-dlp

      - name: Build Application with our setup script
        run: python build.py

      - name: Compile Inno Setup Installer
        run: iscc installer.iss

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-UltimateMediaDownloaderSetup
          path: InnoOutput/UltimateMediaDownloaderSetup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller and Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 yt-dlp

      - name: Build Application with our setup script
        run: python build.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package into a macOS DMG format
        run: |
          create-dmg \
            --volname "Ultimate Media Downloader Pro" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "UltimateMediaDownloader.app" 200 190 \
            --hide-extension "UltimateMediaDownloader.app" \
            --app-drop-link 400 190 \
            "UltimateMediaDownloader.dmg" \
            "dist/UltimateMediaDownloader.app"
            
      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-UltimateMediaDownloader
          path: UltimateMediaDownloader.dmg
